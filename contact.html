							<h2 class="title title--h2">Contact Form</h2>

									</div>
									<div class="form-group col-12 col-md-6">
										<input type="text" class="input form-control" id="subjectContact" name="subjectContact" placeholder="Subject" required="required">
									</div>
									<div class="form-group col-12 col-md-12">
										<textarea class="textarea form-control" id="messageContact" name="messageContact" placeholder="Your Message" rows="4" required="required"></textarea>
									</div>
								</div>
								<div class="row">

											</div>
										</div>
									</div>
